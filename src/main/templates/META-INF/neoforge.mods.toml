license="${mod_license}"

issueTrackerURL="https://github.com/Illusioner2520/Shelf-Numbers/issues"

[[mods]]

modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="assets/shelf_numbers/icon.png"
authors="Illusioner2520"
description='''
Displays the number of items on shelves
'''
[[mixins]]
config="${mod_id}.client.mixins.json"

[[accessTransformers]]
file="META-INF/accesstransformer.cfg"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[26.2.0.1-beta,)"
    ordering="NONE"
    side="CLIENT"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="CLIENT"